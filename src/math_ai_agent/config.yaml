# =============================================================================
# Server Configuration
# =============================================================================
server:
    calculator_mcp:
        #    is_oauth: false
        #    url: "http://127.0.0.1:9000/mcp"
        is_oauth: true
        url: "https://rubens-calculator-mcp.fastmcp.app/mcp"
        # location to store OAuth token
        token_dir: "/home/rubens/.fastmcp"
        # fixed port for the OAuth callback server
        callback_port: 10000
        # timeout in seconds
        timeout: 10

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
    version: 1
    disable_existing_loggers: false
    formatters:
        standard:
            format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    handlers:
        console:
            class: logging.StreamHandler
            formatter: standard
            stream: ext://sys.stderr
    loggers:
        math_ai_agent:
            level: INFO
            handlers:
                - console
            propagate: false
        # MCP protocol tracing — set to DEBUG to see full JSON-RPC messages
        mcp.client.streamable_http:
            level: INFO
            handlers:
                - console
            propagate: false
        # HTTP request/response summaries — set to DEBUG for detail
        httpx:
            level: INFO
            handlers:
                - console
            propagate: false
        # HTTP wire-level tracing (headers, TCP) — set to DEBUG for detail
        httpcore:
            level: INFO
            handlers:
                - console
            propagate: false
        # Server: HTTP request lines (method, path, status)
        uvicorn.access:
            level: INFO
            handlers:
                - console
            propagate: false
    root:
        level: WARNING
        handlers:
            - console
